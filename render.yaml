services:
  # Web Service
  - type: web
    name: fastapi-todo
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: magix-db
          property: connectionString

  # PostgreSQL Database
  - type: pserv
    name: magix-db
    runtime: postgresql
    plan: free
    databaseName: magix
    user: postgres
